          validation 400, etc.). We replace the wrapper with a clone-safe version that
          preserves the same postMessage logging behaviour but never consumes the
          original response body.
        -->

            try {
              var native = window.__nativeFetch;
              if (!native) return;
              var parentOrigin = '*';

                try {

                    source: 'preview-logger',
                    type: type,
                    category: 'network',
                    severity: severity || 'error',
                    data: data,
                    timestamp: new Date().toISOString()
                  }, parentOrigin);
                } catch (e) { /* no-op */ }
              }
              window.fetch = function () {
                var args = arguments;
                var url = args[0];
                var startTime = Date.now();
                return native.apply(this, args).then(function (response) {
                  if (!response.ok) {
                    try {
                      // Clone so we never consume the original body stream
                      response.clone().text().then(function (body) {
                        sendToParent('networkError', {
                          url: typeof url === 'string' ? url : (url && url.url) || '',
                          status: response.status,
                          statusText: response.statusText,
                          responseBody: (body || '').substring(0, 1000),
                          duration: Date.now() - startTime,
                          type: 'API Error'
                        }, 'error');
                      }).catch(function () { /* ignore */ });
                    } catch (e) { /* ignore */ }
                  }
                  return response;
                }).catch(function (error) {
                  sendToParent('networkError', {
                    url: typeof url === 'string' ? url : (url && url.url) || '',
                    message: error && error.message,
                    stack: error && error.stack,
                    type: 'Network Error',
                    duration: Date.now() - startTime
                  }, 'error');
                  throw error;
                });
              };
            } catch (e) { /* no-op: never break the app */ }
          })();
        </script>
